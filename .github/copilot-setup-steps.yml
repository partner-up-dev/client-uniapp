name: Setup Partner Up Uniapp Development Environment

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test:mp-weixin

      - name: Verify setup
        run: |
          echo "Node.js version: $(node --version)"
          echo "pnpm version: $(pnpm --version)"
          echo "Dependencies installed successfully"
          echo "Tests passed successfully"
          echo "Environment is ready for development"
          echo ""
          echo "Available commands:"
          echo "  pnpm test:mp-weixin    - Run tests for WeChat platform"
          echo "  pnpm test:h5           - Run tests for H5 platform"
          echo "  pnpm type-check        - Run TypeScript type checking"
          echo "  pnpm build:mp-weixin   - Build for WeChat Mini Program production"
          echo "  pnpm build:mp-alipay   - Build for Alipay Mini Program production"
